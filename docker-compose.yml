services:
  postgres:
    image: postgres:16-alpine
    container_name: ces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ces
      POSTGRES_PASSWORD: ces
      POSTGRES_DB: ces
    ports:
      - "5432:5432"
    volumes:
      - ces-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces -d ces"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ces-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ces-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ces-postgres:
  ces-redis:
