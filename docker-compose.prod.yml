services:
  postgres:
    image: postgres:16-alpine
    container_name: ces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ces
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ces_prod_change_me}
      POSTGRES_DB: ces
    volumes:
      - ces-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces -d ces"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ces-redis
    restart: unless-stopped
    volumes:
      - ces-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ces-app
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://ces:${DB_PASSWORD:-ces_prod_change_me}@postgres:5432/ces
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

volumes:
  ces-postgres:
  ces-redis:
